<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 ¡La Slot de la Peña! 🎰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap');
        .font-game { font-family: 'Bungee', cursive; }
        .font-sans { font-family: 'Poppins', sans-serif; }
        
        /* Efecto Neón Pro */
        .neon-box {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6), inset 0 0 20px rgba(168, 85, 247, 0.4);
            border: 4px solid #a855f7;
        }
        .neon-text-cyan { text-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4; }
        .neon-text-pink { text-shadow: 0 0 10px #f43f5e, 0 0 20px #f43f5e; }

        /* Animación de giro hiperrealista (Motion Blur) */
        .blur-spinning {
            animation: blurText 0.1s infinite linear;
            filter: blur(4px);
            transform: scaleY(1.3);
        }

        @keyframes blurText {
            0% { transform: translateY(-10px) scaleY(1.5); }
            100% { transform: translateY(10px) scaleY(1.5); }
        }

        /* Luces de la cabina de la slot */
        .led-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #f43f5e;
            animation: blink 0.5s infinite alternate;
        }
        .led-light:nth-child(even) {
            animation-delay: 0.25s;
            background-color: #06b6d4;
        }
        @keyframes blink {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen flex flex-col items-center justify-between p-4 overflow-x-hidden selection:bg-purple-500">

    <!-- Decoración de fondo de fiesta -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-10">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-500 rounded-full filter blur-3xl"></div>
        <div class="absolute bottom-10 right-0 w-96 h-96 bg-cyan-500 rounded-full filter blur-3xl"></div>
    </div>

    <!-- Cabecera llamativa -->
    <header class="text-center mt-4 z-10">
        <h1 class="font-game text-4xl md:text-6xl text-rose-500 neon-text-pink tracking-wider">¡SLOT FIESTA!</h1>
        <p class="font-game text-xl md:text-2xl text-cyan-400 neon-text-cyan tracking-wide mt-1">EL JUEGO DE LA PEÑA</p>
    </header>

    <!-- Máquina Tragaperras -->
    <main class="w-full max-w-sm bg-slate-900 rounded-3xl p-6 neon-box my-auto flex flex-col items-center relative z-10">
        
        <!-- Luces LED decorativas tipo casino -->
        <div class="absolute top-3 left-6 right-6 flex justify-between px-2">
            <div class="led-light"></div><div class="led-light"></div><div class="led-light"></div>
            <div class="led-light"></div><div class="led-light"></div><div class="led-light"></div>
        </div>

        <!-- Pantalla de los Rodillos (Efecto cristal) -->
        <div class="grid grid-cols-3 gap-4 bg-gradient-to-b from-black via-slate-950 to-black w-full rounded-2xl p-4 border-2 border-slate-800 mb-6 h-36 items-center justify-items-center shadow-inner relative mt-4">
            <!-- Línea de premio central -->
            <div class="absolute left-0 right-0 h-0.5 bg-rose-500 opacity-40 z-0 top-1/2 -translate-y-1/2"></div>
            
            <div class="z-10 bg-slate-900/80 w-full h-full rounded-xl flex items-center justify-center border border-slate-800 shadow-md">
                <div id="reel1" class="text-5xl md:text-6xl transition-all duration-100 select-none">🥃</div>
            </div>
            <div class="z-10 bg-slate-900/80 w-full h-full rounded-xl flex items-center justify-center border border-slate-800 shadow-md">
                <div id="reel2" class="text-5xl md:text-6xl transition-all duration-100 select-none">🍾</div>
            </div>
            <div class="z-10 bg-slate-900/80 w-full h-full rounded-xl flex items-center justify-center border border-slate-800 shadow-md">
                <div id="reel3" class="text-5xl md:text-6xl transition-all duration-100 select-none">🍺</div>
            </div>
        </div>

        <!-- Pantalla de Mensajes Dinámica -->
        <div id="result-display" class="w-full bg-slate-950 rounded-xl p-4 border border-purple-900/60 text-center min-h-20 flex flex-col items-center justify-center mb-6 shadow-inner">
            <p class="text-purple-300 font-bold text-sm md:text-base animate-pulse">Pulse el botón para tentar a la suerte...</p>
        </div>

        <!-- Botón de Jugar Estilo Arcade -->
        <button id="spin-btn" class="w-full bg-gradient-to-r from-rose-500 via-purple-600 to-cyan-500 hover:brightness-110 active:scale-95 font-game text-xl py-4 rounded-2xl shadow-[0_0_20px_rgba(244,63,94,0.4)] transition-all duration-150 cursor-pointer border-b-8 border-purple-900 text-white tracking-wider uppercase">
            🎰 ¡DARLE CAÑA!
        </button>

    </main>

    <footer class="text-slate-500 text-xs text-center mb-2 z-10">
        Hecho para la Peña • Controla lo que bebes 
    </footer>

    <!-- Lógica y Animaciones Avanzadas -->
    <script>
        const items = ['🥃', '🍾', '🍺', '🍹', '💧', '👑'];
        
        const rewards = {
            '🥃': '¡CHUPITO DE JÄGER! Al suelo.',
            '🍾': '¡PÁJARO LOCO! Te ha tocado una BOTELLA entera.',
            '🍺': '¡CAÑA CORTA! Una cervecita para refrescar.',
            '🍹': '¡CUBATAZO! Pide tu copa en la barra.',
            '💧': '¡AGUA! Te toca hidratarte en esta ronda.',
            '👑': '¡EL REY! Mandas un chupito a quien tú quieras.'
        };

        const winPhrases = ["¡VAYA POTRA!", "¡EL DIOS DE LA FIESTA!", "¡QUE PAGUE OTRO!"];
        const losePhrases = ["Casi... ¡Prueba otra vez!", "Tu hígado te está dando las gracias.", "El Jäger está cerca, insiste."];

        const spinBtn = document.getElementById('spin-btn');
        const display = document.getElementById('result-display');
        const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];

        let isSpinning = false;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            
            spinBtn.disabled = true;
            // Quitamos el borde inferior para simular que el botón arcade se hunde
            spinBtn.style.borderBottomWidth = '2px';
            spinBtn.style.transform = 'translateY(6px)';

            display.innerHTML = '<p class="text-yellow-400 font-game text-lg tracking-widest animate-bounce">¡Girando!</p>';

            // Activar efecto desenfoque y giro loco
            reels.forEach(reel => reel.classList.add('blur-spinning'));

            // Sonido simulado por vibración del móvil si está disponible
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            // Frenar rodillo 1
            setTimeout(() => {
                stopReel(0);
                // Frenar rodillo 2
                setTimeout(() => {
                    stopReel(1);
                    // Frenar rodillo 3
                    setTimeout(() => {
                        const finalResults = stopReel(2);
                        checkResult(finalResults[0], finalResults[1], finalResults[2]);
                    }, 600);
                }, 600);
            }, 1200);
        });

        function stopReel(index) {
            const reel = reels[index];
            reel.classList.remove('blur-spinning');
            const finalEmoji = items[Math.floor(Math.random() * items.length)];
            reel.textContent = finalEmoji;
            
            // Pequeño efecto rebote visual al parar
            reel.style.transform = 'scale(1.3)';
            setTimeout(() => reel.style.transform = 'scale(1)', 100);
            
            // Devolver los emojis actuales en pantalla
            return [reels[0].textContent, reels[1].textContent, reels[2].textContent];
        }

        function checkResult(r1, r2, r3) {
            // Restaurar botón arcade
            spinBtn.disabled = false;
            spinBtn.style.borderBottomWidth = '8px';
            spinBtn.style.transform = 'translateY(0)';
            isSpinning = false;

            // Condición de victoria (3 iguales)
            if (r1 === r2 && r2 === r3) {
                // Explosión masiva de confeti de colores fiesteros
                confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 }, colors: ['#f43f5e', '#06b6d4', '#a855f7', '#eab308'] });
                setTimeout(() => confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 } }), 200);
                setTimeout(() => confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 } }), 200);

                display.innerHTML = `
                    <p class="font-game text-xl text-yellow-400 neon-text-cyan mb-1">${winPhrases[Math.floor(Math.random() * winPhrases.length)]}</p>
                    <p class="text-emerald-400 font-bold text-base md:text-lg">${rewards[r1]}</p>
                `;
            } else {
                // Derrota
                display.innerHTML = `
                    <p class="text-slate-400 italic text-sm md:text-base">${losePhrases[Math.floor(Math.random() * losePhrases.length)]}</p>
                `;
            }
        }
    </script>
</body>
</html>
