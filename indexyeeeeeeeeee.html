<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Fonsi's Treasure Slot 🎰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;700&display=swap');
        .font-pirate { font-family: 'Cinzel', serif; }
        
        /* Contenedor principal con tu imagen de fondo */
        .slot-machine-container {
            background-image: url('fondo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            aspect-ratio: 1040 / 715; /* Proporción exacta de tu imagen */
        }

        /* Animación de Giro (Motion Blur) */
        .blur-spinning {
            animation: blurText 0.1s infinite linear;
            filter: blur(6px);
        }
        @keyframes blurText {
            0% { transform: translateY(-15px) scaleY(1.4); }
            100% { transform: translateY(15px) scaleY(1.4); }
        }
    </style>
</head>
<body class="bg-stone-950 text-white font-sans min-h-screen flex flex-col items-center justify-center p-2 md:p-4 overflow-x-hidden selection:bg-amber-600">

    <div class="w-full max-w-2xl flex flex-col items-center gap-4">

        <div class="slot-machine-container w-full relative rounded-2xl shadow-[0_0_30px_rgba(217,119,6,0.3)]">
            
            <div class="absolute bottom-[8.5%] left-[12%] w-[76%] h-[28.5%] grid grid-cols-3 gap-[1.5%] px-[1%] items-center justify-items-center overflow-hidden">
                
                <div class="w-full h-full bg-amber-950/85 backdrop-blur-[2px] rounded-lg flex items-center justify-center border border-amber-700/30 shadow-inner">
                    <div id="reel1" class="text-4xl md:text-6xl transition-all duration-100 select-none filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">🥃</div>
                </div>
                
                <div class="w-full h-full bg-amber-950/85 backdrop-blur-[2px] rounded-lg flex items-center justify-center border border-amber-700/30 shadow-inner">
                    <div id="reel2" class="text-4xl md:text-6xl transition-all duration-100 select-none filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">🍾</div>
                </div>
                
                <div class="w-full h-full bg-amber-950/85 backdrop-blur-[2px] rounded-lg flex items-center justify-center border border-amber-700/30 shadow-inner">
                    <div id="reel3" class="text-4xl md:text-6xl transition-all duration-100 select-none filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">🍺</div>
                </div>

            </div>
        </div>

        <div id="result-display" class="w-full max-w-md bg-stone-900 border-2 border-amber-600/40 rounded-xl p-3 text-center min-h-16 flex items-center justify-center shadow-md">
            <p class="text-amber-200 font-bold text-sm md:text-base tracking-wide">🏴‍☠️ ¡Tienta a la suerte en el tesoro de Fonsi! 🏴‍☠️</p>
        </div>

        <button id="spin-btn" class="w-full max-w-md bg-gradient-to-r from-amber-600 via-yellow-500 to-amber-700 hover:brightness-110 active:scale-95 font-pirate text-xl py-4 rounded-xl shadow-[0_4px_15px_rgba(217,119,6,0.4)] transition-all duration-150 cursor-pointer border-b-4 border-amber-900 text-stone-950 font-bold tracking-widest uppercase">
            ⚔️ ¡PROBAR SUERTE! ⚔️
        </button>

    </div>

    <script>
        // Iconos fiesteros/piratas
        const items = ['🥃', '🍾', '🍺', '🍹', '☠️', '💰'];
        
        const rewards = {
            '🥃': '¡CHUPITO DE JÄGER! Al suelo marinero.',
            '🍾': '¡EL BOTÍN DE FONSI! Te ha tocado una BOTELLA entera.',
            '🍺': '¡TRAGO DE RON! O una cerveza bien fría.',
            '🍹': '¡CUBATAZO! Pídelo en la barra de la peña.',
            '☠️': 'MALA SUERTE: Te vas al pozo, te toca vaso de AGUA.',
            '💰': '¡EL COFRE DEL TESORO! Eliges quién se toma un chupito.'
        };

        const winPhrases = ["¡VAYA POTRA DE PIRATA!", "¡AL ABORDAJE DE LA BARRA!", "¡HOY CORRE EL JÄGER!"];
        const losePhrases = ["Casi... ¡La barra te espera!", "Los dados no han querido. ¡Prueba otra vez!", "El tesoro de Fonsi se resiste."];

        const spinBtn = document.getElementById('spin-btn');
        const display = document.getElementById('result-display');
        const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];

        let isSpinning = false;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            
            spinBtn.disabled = true;
            spinBtn.style.borderBottomWidth = '0px';
            spinBtn.style.transform = 'translateY(4px)';

            display.innerHTML = '<p class="text-yellow-400 font-pirate text-lg tracking-widest animate-pulse">¡GIRANDO LOS RODILLOS!</p>';

            // Aplicar desenfoque de movimiento rápido
            reels.forEach(reel => reel.classList.add('blur-spinning'));

            // Parar rodillos en cascada
            setTimeout(() => {
                stopReel(0);
                setTimeout(() => {
                    stopReel(1);
                    setTimeout(() => {
                        const final = stopReel(2);
                        checkResult(final[0], final[1], final[2]);
                    }, 500);
                }, 500);
            }, 1000);
        });

        function stopReel(index) {
            const reel = reels[index];
            reel.classList.remove('blur-spinning');
            const finalEmoji = items[Math.floor(Math.random() * items.length)];
            reel.textContent = finalEmoji;
            
            // Efecto rebote visual
            reel.style.transform = 'scale(1.3)';
            setTimeout(() => reel.style.transform = 'scale(1)', 100);
            
            return [reels[0].textContent, reels[1].textContent, reels[2].textContent];
        }

        function checkResult(r1, r2, r3) {
            spinBtn.disabled = false;
            spinBtn.style.borderBottomWidth = '4px';
            spinBtn.style.transform = 'translateY(0)';
            isSpinning = false;

            if (r1 === r2 && r2 === r3) {
                // Confeti dorado de pirata
                confetti({ particleCount: 120, spread: 60, origin: { y: 0.7 }, colors: ['#d97706', '#f59e0b', '#fbbf24', '#ffffff'] });

                display.innerHTML = `
                    <div class="text-center">
                        <p class="font-pirate text-amber-400 text-base mb-1">${winPhrases[Math.floor(Math.random() * winPhrases.length)]}</p>
                        <p class="text-emerald-400 font-bold text-sm md:text-base">${rewards[r1]}</p>
                    </div>
                `;
            } else {
                display.innerHTML = `
                    <p class="text-stone-400 italic text-sm">${losePhrases[Math.floor(Math.random() * losePhrases.length)]}</p>
                `;
            }
        }
    </script>
</body>
</html>
